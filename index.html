<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Squishy!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ebe6;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }

  /* --- Select Screen --- */
  .select-screen {
    display: flex; flex-direction: column;
    align-items: center; gap: 30px;
  }
  .select-screen.hidden { display: none; }
  .select-title { color: #7a6a5a; font-size: 22px; font-weight: bold; letter-spacing: 3px; }
  .select-items { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .select-card {
    width: 150px; height: 180px;
    background: #fff; border-radius: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
    cursor: pointer; border: 3px solid transparent;
    transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  }
  .select-card:hover { border-color: #c4a4d4; transform: scale(1.05); }
  .select-card:active { transform: scale(0.97); }
  .card-icon { width: 80px; height: 80px; }
  .card-label { color: #6a5a4a; font-size: 15px; font-weight: 600; }

  /* --- Game Screen --- */
  .game-screen { display: none; width: 100%; height: 100%; }
  .game-screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .title { position: fixed; top: 22px; color: #9a8878; font-size: 18px; font-weight: bold; letter-spacing: 3px; }
  .hint { position: fixed; bottom: 28px; color: #b0a090; font-size: 13px; opacity: 0.6; }
  .bottom-btns { position: fixed; bottom: 58px; display: flex; gap: 12px; z-index: 10; }
  .btn {
    background: #d4c4b0; border: none; padding: 10px 22px;
    border-radius: 20px; color: #5a4a3a; font-size: 13px;
    cursor: pointer; letter-spacing: 1px;
  }
  .btn:hover { background: #c4b4a0; }
  canvas { cursor: pointer; touch-action: none; }
</style>
</head>
<body>

<!-- Select Screen -->
<div class="select-screen" id="selectScreen">
  <div class="select-title">뭘 부술까?</div>
  <div class="select-items">
    <div class="select-card" onclick="startGame('wakppu')">
      <canvas class="card-icon" id="iconWakppu" width="80" height="80"></canvas>
      <div class="card-label">왁뿌볼</div>
    </div>
    <div class="select-card" onclick="startGame('butter')">
      <canvas class="card-icon" id="iconButter" width="80" height="80"></canvas>
      <div class="card-label">버터</div>
    </div>
  </div>
</div>

<!-- Game Screen -->
<div class="game-screen" id="gameScreen">
  <div class="title" id="gameTitle"></div>
  <canvas id="c"></canvas>
  <div class="bottom-btns">
    <button class="btn" id="resetBtn">새로 하기</button>
    <button class="btn" id="backBtn">다른 거</button>
  </div>
  <div class="hint" id="hintText"></div>
</div>

<script>
// ============ ICON DRAWING ============
(function drawIcons() {
  // wakppu icon
  const wCtx = document.getElementById('iconWakppu').getContext('2d');
  const g1 = wCtx.createRadialGradient(30, 30, 0, 40, 40, 38);
  g1.addColorStop(0, 'hsl(270,45%,85%)'); g1.addColorStop(1, 'hsl(285,35%,62%)');
  wCtx.beginPath(); wCtx.arc(40, 40, 32, 0, Math.PI * 2);
  wCtx.fillStyle = g1; wCtx.fill();
  wCtx.beginPath(); wCtx.ellipse(32, 28, 12, 5, -0.3, 0, Math.PI * 2);
  wCtx.fillStyle = 'rgba(255,255,255,0.35)'; wCtx.fill();

  // butter icon
  const bCtx = document.getElementById('iconButter').getContext('2d');
  bCtx.save();
  bCtx.translate(40, 42);
  // top face
  bCtx.beginPath();
  bCtx.moveTo(-30, -12); bCtx.lineTo(-20, -22);
  bCtx.lineTo(30, -22); bCtx.lineTo(30, -12);
  bCtx.closePath();
  bCtx.fillStyle = '#f5e6a8'; bCtx.fill();
  bCtx.strokeStyle = '#d4c478'; bCtx.lineWidth = 1; bCtx.stroke();
  // front face
  bCtx.beginPath();
  bCtx.moveTo(-30, -12); bCtx.lineTo(30, -12);
  bCtx.lineTo(30, 12); bCtx.lineTo(-30, 12);
  bCtx.closePath();
  bCtx.fillStyle = '#f8ebb5'; bCtx.fill();
  bCtx.strokeStyle = '#d4c478'; bCtx.lineWidth = 1; bCtx.stroke();
  // side face
  bCtx.beginPath();
  bCtx.moveTo(30, -22); bCtx.lineTo(30, -12);
  bCtx.lineTo(30, 12); bCtx.lineTo(30, 2);
  bCtx.closePath();
  bCtx.fillStyle = '#e8d898'; bCtx.fill();
  // label
  bCtx.fillStyle = '#4a7ac4'; bCtx.font = 'bold 7px sans-serif';
  bCtx.fillText('BUTTER', -18, 2);
  bCtx.restore();
})();

// ============ GAME STATE ============
let mode = '';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let pressing = false, pressX = 0, pressY = 0;
let scaleX = 1, scaleY = 1, tSX = 1, tSY = 1;
let shakeX = 0, shakeY = 0;
let destroyed = false;

function startGame(m) {
  mode = m;
  document.getElementById('selectScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('gameTitle').textContent = m === 'wakppu' ? '왁뿌볼' : '버터';
  document.getElementById('hintText').textContent = m === 'wakppu' ? '꾹 눌러서 부숴보세요!' : '꾹 눌러서 눌러보세요!';
  resize();
  resetGame();
  requestAnimationFrame(loop);
}

function goBack() {
  document.getElementById('selectScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.remove('active');
  mode = '';
}

document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('resetBtn').addEventListener('click', resetGame);

// ============ AUDIO ============
let audioCtx;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNoise(freq, vol, dur) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * (1 - j / d.length);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = freq;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol, t); gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(hp).connect(gain).connect(audioCtx.destination);
  src.start(t); src.stop(t + dur);
}

function playCrack(intensity) {
  const n = 3 + Math.floor(intensity * 5);
  for (let i = 0; i < n; i++) setTimeout(() => playNoise(1200 + Math.random() * 3000, 0.15 + intensity * 0.25, 0.015 + Math.random() * 0.04), i * 8);
}

function playSquish(intensity) {
  const n = 2 + Math.floor(intensity * 3);
  for (let i = 0; i < n; i++) setTimeout(() => playNoise(200 + Math.random() * 800, 0.08 + intensity * 0.12, 0.04 + Math.random() * 0.06), i * 20);
}

function playBigCrunch() { for (let i = 0; i < 30; i++) setTimeout(() => playCrack(0.5 + Math.random() * 0.5), i * 12); }
function playBigSquish() { for (let i = 0; i < 15; i++) setTimeout(() => playSquish(0.6 + Math.random() * 0.4), i * 25); }

// ============ WAKPPU ============
let wCracks = [], wFragments = [], wTotalCracks = 0;

function wMakeLine(sx, sy, angle) {
  const R = Math.min(W, H) * 0.22;
  const pts = [{ x: sx, y: sy }];
  let curX = sx, curY = sy, curA = angle;
  for (let i = 0; i < 200; i++) {
    curA += (Math.random() - 0.5) * 0.6;
    const len = 6 + Math.random() * 4;
    curX += Math.cos(curA) * len; curY += Math.sin(curA) * len;
    if (curX * curX + curY * curY >= R * R * 0.97) {
      const norm = Math.sqrt(curX * curX + curY * curY);
      pts.push({ x: curX / norm * R * 0.98, y: curY / norm * R * 0.98 });
      break;
    }
    pts.push({ x: curX, y: curY });
  }
  return pts;
}

function wSpawn(ox, oy, count) {
  const lx = ox - cx, ly = oy - cy;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;
    wCracks.push({ points: wMakeLine(lx, ly, angle), width: 1.5 + Math.random() * 1.5, appear: performance.now() });
    wTotalCracks++;
    if (Math.random() < 0.5) {
      const pts = wCracks[wCracks.length - 1].points;
      if (pts.length > 3) {
        const fi = 1 + Math.floor(Math.random() * Math.min(4, pts.length - 2));
        const fp = pts[fi];
        const fa = angle + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.7);
        wCracks.push({ points: wMakeLine(fp.x, fp.y, fa), width: 1 + Math.random(), appear: performance.now() + 30 });
        wTotalCracks++;
      }
    }
  }
}

function wSpawnFrag(x, y) {
  const a = Math.atan2(y, x) + (Math.random() - 0.5);
  const sp = 2 + Math.random() * 5;
  const sz = 5 + Math.random() * 14;
  const n = 4 + Math.floor(Math.random() * 3);
  const pts = [];
  for (let i = 0; i < n; i++) { const a2 = (Math.PI * 2 / n) * i + Math.random() * 0.5; pts.push({ x: Math.cos(a2) * (0.5 + Math.random() * 0.5), y: Math.sin(a2) * (0.5 + Math.random() * 0.5) }); }
  wFragments.push({ x: cx + x, y: cy + y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 3, size: sz, pts, rot: Math.random() * Math.PI * 2, rotSpd: (Math.random() - 0.5) * 0.15, alpha: 1, hue: 270 + (Math.random() - 0.5) * 30 });
}

// ============ BUTTER ============
let bDents = [], bFragments = [], bTotalDamage = 0;

function bSpawnDent(ox, oy) {
  const bw = Math.min(W, H) * 0.35, bh = bw * 0.42, bd = bw * 0.22;
  const lx = ox - cx, ly = oy - cy;
  bDents.push({
    x: lx, y: ly,
    radius: 8 + Math.random() * 12,
    depth: 0.3 + Math.random() * 0.7,
    appear: performance.now(),
  });
  bTotalDamage += 0.08;
}

function bSpawnCrumbs(ox, oy, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 3;
    bFragments.push({
      x: ox, y: oy,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1.5,
      size: 2 + Math.random() * 5,
      rot: Math.random() * Math.PI * 2,
      rotSpd: (Math.random() - 0.5) * 0.2,
      alpha: 1,
    });
  }
}

// ============ INPUT ============
let pressStart = 0, firstDone = false, secondDone = false;

function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onPress(e) {
  e.preventDefault();
  if (destroyed) return;
  const p = getPos(e);
  initAudio();

  if (mode === 'wakppu') {
    const R = Math.min(W, H) * 0.22;
    const dx = p.x - cx, dy = p.y - cy;
    if (dx * dx + dy * dy > (R * 1.3) ** 2) return;
  } else {
    const bw = Math.min(W, H) * 0.35;
    const bh = bw * 0.42;
    if (Math.abs(p.x - cx) > bw * 0.7 || Math.abs(p.y - cy) > bh * 1.2) return;
  }

  pressing = true;
  pressX = p.x; pressY = p.y;
  pressStart = performance.now();
  firstDone = false; secondDone = false;
}

function onMove(e) { e.preventDefault(); if (pressing) { const p = getPos(e); pressX = p.x; pressY = p.y; } }
function onRelease(e) { if (e) e.preventDefault(); pressing = false; tSX = 1; tSY = 1; }

canvas.addEventListener('mousedown', onPress);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onRelease);
canvas.addEventListener('mouseleave', () => { if (pressing) onRelease(); });
canvas.addEventListener('touchstart', onPress);
canvas.addEventListener('touchmove', onMove);
canvas.addEventListener('touchend', onRelease);

// ============ RESET ============
function resetGame() {
  wCracks = []; wFragments = []; wTotalCracks = 0;
  bDents = []; bFragments = []; bTotalDamage = 0;
  destroyed = false; pressing = false;
  scaleX = 1; scaleY = 1; tSX = 1; tSY = 1;
  shakeX = 0; shakeY = 0;
}

// ============ RESIZE ============
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
}

// ============ UPDATE ============
function update() {
  const now = performance.now();

  if (pressing && !destroyed) {
    const elapsed = (now - pressStart) / 1000;

    if (mode === 'wakppu') {
      if (!firstDone) {
        firstDone = true;
        wSpawn(pressX, pressY, 3 + Math.floor(Math.random() * 2));
        playCrack(0.8);
        shakeX = (Math.random() - 0.5) * 8; shakeY = (Math.random() - 0.5) * 8;
        tSX = 1.07; tSY = 0.94;
      }
      if (!secondDone && elapsed > 0.5) {
        secondDone = true;
        wSpawn(pressX, pressY, 2 + Math.floor(Math.random() * 2));
        playCrack(1.0);
        shakeX += (Math.random() - 0.5) * 10; shakeY += (Math.random() - 0.5) * 10;
        tSX = 1.09; tSY = 0.92;
      }
      if (elapsed >= 1.0) { pressing = false; tSX = 1; tSY = 1; }
      if (wTotalCracks > 25) {
        destroyed = true; pressing = false;
        playBigCrunch();
        const R = Math.min(W, H) * 0.22;
        for (let i = 0; i < 50; i++) { const a = Math.random() * Math.PI * 2, r = Math.random() * R * 0.85; wSpawnFrag(Math.cos(a) * r, Math.sin(a) * r); }
      }
    }

    if (mode === 'butter') {
      if (!firstDone) {
        firstDone = true;
        bSpawnDent(pressX, pressY);
        bSpawnCrumbs(pressX, pressY, 4);
        playSquish(0.7);
        shakeX = (Math.random() - 0.5) * 3; shakeY = (Math.random() - 0.5) * 3;
        tSX = 1.04; tSY = 0.97;
      }
      if (!secondDone && elapsed > 0.4) {
        secondDone = true;
        bSpawnDent(pressX, pressY);
        bSpawnCrumbs(pressX, pressY, 6);
        playSquish(1.0);
        tSX = 1.06; tSY = 0.95;
      }
      if (elapsed >= 1.0) { pressing = false; tSX = 1; tSY = 1; }
      if (bTotalDamage >= 1) {
        destroyed = true; pressing = false;
        playBigSquish();
        const bw = Math.min(W, H) * 0.35;
        for (let i = 0; i < 35; i++) bSpawnCrumbs(cx + (Math.random() - 0.5) * bw, cy + (Math.random() - 0.5) * bw * 0.4, 3);
      }
    }
  }

  scaleX += (tSX - scaleX) * 0.2; scaleY += (tSY - scaleY) * 0.2;
  if (!pressing) { tSX = 1; tSY = 1; }
  shakeX *= 0.8; shakeY *= 0.8;

  wFragments.forEach(f => { f.x += f.vx; f.y += f.vy; f.vy += 0.22; f.rot += f.rotSpd; f.alpha -= 0.01; });
  wFragments = wFragments.filter(f => f.alpha > 0);

  bFragments.forEach(f => { f.x += f.vx; f.y += f.vy; f.vy += 0.18; f.rot += f.rotSpd; f.alpha -= 0.012; });
  bFragments = bFragments.filter(f => f.alpha > 0);
}

// ============ DRAW WAKPPU ============
function drawWakppu() {
  const R = Math.min(W, H) * 0.22;

  ctx.save();
  ctx.translate(cx + shakeX, cy + shakeY);
  ctx.scale(scaleX, scaleY);

  ctx.beginPath(); ctx.ellipse(0, R * 0.88, R * 0.55, R * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.07)'; ctx.fill();

  if (!destroyed) {
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.clip();

    const grad = ctx.createRadialGradient(-R * 0.3, -R * 0.3, 0, 0, 0, R * 1.1);
    grad.addColorStop(0, 'hsl(270,45%,85%)'); grad.addColorStop(0.5, 'hsl(270,40%,75%)'); grad.addColorStop(1, 'hsl(285,35%,62%)');
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();

    const now = performance.now();
    wCracks.forEach(crack => {
      const age = now - crack.appear;
      if (age < 0) return;
      const show = Math.ceil(crack.points.length * Math.min(1, age / 50));
      if (show < 2) return;
      ctx.beginPath(); ctx.moveTo(crack.points[0].x, crack.points[0].y);
      for (let i = 1; i < show; i++) ctx.lineTo(crack.points[i].x, crack.points[i].y);
      ctx.strokeStyle = 'rgba(50,30,15,0.75)'; ctx.lineWidth = crack.width; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(crack.points[0].x, crack.points[0].y);
      for (let i = 1; i < show; i++) ctx.lineTo(crack.points[i].x, crack.points[i].y);
      ctx.strokeStyle = 'rgba(180,215,140,0.3)'; ctx.lineWidth = crack.width * 0.4; ctx.stroke();
    });

    ctx.beginPath(); ctx.ellipse(-R * 0.22, -R * 0.38, R * 0.3, R * 0.13, -0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(-R * 0.12, -R * 0.48, R * 0.1, R * 0.05, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  wFragments.forEach(f => {
    ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(f.rot); ctx.globalAlpha = f.alpha;
    ctx.beginPath(); f.pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x * f.size, p.y * f.size) : ctx.lineTo(p.x * f.size, p.y * f.size));
    ctx.closePath(); ctx.fillStyle = `hsl(${f.hue},38%,72%)`; ctx.fill();
    ctx.globalAlpha = 1; ctx.restore();
  });
}

// ============ DRAW BUTTER ============
function drawButter() {
  const bw = Math.min(W, H) * 0.35;
  const bh = bw * 0.42;
  const bd = bw * 0.22;

  ctx.save();
  ctx.translate(cx + shakeX, cy + shakeY);
  ctx.scale(scaleX, scaleY);

  // shadow
  ctx.beginPath(); ctx.ellipse(0, bh / 2 + 15, bw * 0.55, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.fill();

  if (!destroyed) {
    // top face
    ctx.beginPath();
    ctx.moveTo(-bw / 2, -bh / 2);
    ctx.lineTo(-bw / 2 + bd * 0.5, -bh / 2 - bd);
    ctx.lineTo(bw / 2 + bd * 0.5, -bh / 2 - bd);
    ctx.lineTo(bw / 2, -bh / 2);
    ctx.closePath();
    ctx.fillStyle = '#f5e6a8'; ctx.fill();
    ctx.strokeStyle = '#d4c478'; ctx.lineWidth = 1; ctx.stroke();

    // right side
    ctx.beginPath();
    ctx.moveTo(bw / 2, -bh / 2);
    ctx.lineTo(bw / 2 + bd * 0.5, -bh / 2 - bd);
    ctx.lineTo(bw / 2 + bd * 0.5, bh / 2 - bd);
    ctx.lineTo(bw / 2, bh / 2);
    ctx.closePath();
    ctx.fillStyle = '#e8d898'; ctx.fill();
    ctx.strokeStyle = '#d4c478'; ctx.lineWidth = 1; ctx.stroke();

    // front face
    ctx.beginPath();
    ctx.moveTo(-bw / 2, -bh / 2);
    ctx.lineTo(bw / 2, -bh / 2);
    ctx.lineTo(bw / 2, bh / 2);
    ctx.lineTo(-bw / 2, bh / 2);
    ctx.closePath();
    const bGrad = ctx.createLinearGradient(0, -bh / 2, 0, bh / 2);
    bGrad.addColorStop(0, '#faf0c0'); bGrad.addColorStop(0.5, '#f8ebb5'); bGrad.addColorStop(1, '#f0e0a0');
    ctx.fillStyle = bGrad; ctx.fill();
    ctx.strokeStyle = '#d4c478'; ctx.lineWidth = 1; ctx.stroke();

    // label
    ctx.fillStyle = '#5a8ad4'; ctx.font = `bold ${bw * 0.05}px sans-serif`;
    ctx.fillText('4oz.', -bw * 0.38, bh * 0.1);
    ctx.font = `${bw * 0.035}px sans-serif`;
    ctx.fillText('NET WT. (113 G)', -bw * 0.38, bh * 0.22);
    ctx.fillStyle = '#5a8ad4'; ctx.font = `${bw * 0.04}px sans-serif`;
    ctx.fillText('SALTED', bw * 0.02, -bh * 0.18);
    ctx.font = `bold ${bw * 0.09}px sans-serif`;
    ctx.fillText('BUTTER', bw * 0.02, bh * 0.05);

    // highlight
    ctx.beginPath(); ctx.ellipse(-bw * 0.15, -bh * 0.3, bw * 0.2, bh * 0.08, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fill();

    // dents
    bDents.forEach(d => {
      const age = performance.now() - d.appear;
      const reveal = Math.min(1, age / 80);
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.radius * reveal, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(210, 185, 110, ${d.depth * 0.5 * reveal})`;
      ctx.fill();
      // dent shadow
      ctx.beginPath();
      ctx.ellipse(d.x, d.y + d.radius * 0.3 * reveal, d.radius * 0.8 * reveal, d.radius * 0.3 * reveal, 0, 0, Math.PI);
      ctx.fillStyle = `rgba(180, 155, 80, ${d.depth * 0.3 * reveal})`;
      ctx.fill();
    });
  }

  ctx.restore();

  // crumbs
  bFragments.forEach(f => {
    ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(f.rot); ctx.globalAlpha = f.alpha;
    ctx.beginPath(); ctx.arc(0, 0, f.size, 0, Math.PI * 2);
    ctx.fillStyle = '#f0dfa0'; ctx.fill();
    ctx.globalAlpha = 1; ctx.restore();
  });
}

// ============ LOOP ============
function loop() {
  if (!mode) return;
  update();
  ctx.fillStyle = '#f0ebe6'; ctx.fillRect(0, 0, W, H);
  if (mode === 'wakppu') drawWakppu();
  else if (mode === 'butter') drawButter();
  requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize', resize);
</script>
</body>
