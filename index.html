<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>왁뿌볼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ebe6;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }
  .title { position: fixed; top: 22px; color: #9a8878; font-size: 18px; font-weight: bold; letter-spacing: 3px; }
  .hint { position: fixed; bottom: 28px; color: #b0a090; font-size: 13px; opacity: 0.6; }
  .reset-btn {
    position: fixed; bottom: 60px;
    background: #d4c4b0; border: none; padding: 10px 28px;
    border-radius: 20px; color: #5a4a3a; font-size: 14px;
    cursor: pointer; letter-spacing: 1px; z-index: 10;
  }
  .reset-btn:hover { background: #c4b4a0; }
  canvas { cursor: pointer; touch-action: none; }
</style>
</head>
<body>
<div class="title">왁뿌볼</div>
<canvas id="c"></canvas>
<button class="reset-btn" id="resetBtn">새 왁뿌볼</button>
<div class="hint">꾹 눌러서 부숴보세요!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const resetBtn = document.getElementById('resetBtn');

let W, H, cx, cy, R;
let pressing = false, pressX = 0, pressY = 0;
let scaleX = 1, scaleY = 1, tSX = 1, tSY = 1;
let shakeX = 0, shakeY = 0;
let destroyed = false;
let totalCrackLen = 0;

const BALL_HUE = 270;

// --- Audio ---
let audioCtx;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playCrack(intensity) {
  if (!audioCtx) return;
  const n = 2 + Math.floor(intensity * 6);
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const dur = 0.02 + Math.random() * 0.05;
      const t = audioCtx.currentTime;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * (1 - j / d.length);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 1000 + Math.random() * 3000;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.12 + intensity * 0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(hp).connect(gain).connect(audioCtx.destination);
      src.start(t); src.stop(t + dur);
    }, i * (10 + Math.random() * 30));
  }
}

function playBigCrunch() {
  if (!audioCtx) return;
  for (let i = 0; i < 25; i++) {
    setTimeout(() => playCrack(0.6 + Math.random() * 0.4), i * 15 + Math.random() * 20);
  }
}

// --- Cracks ---
let cracks = [];
let fragments = [];

function spawnCrackTree(ox, oy, numBranches, maxDepth) {
  const localX = ox - cx;
  const localY = oy - cy;

  const distFromCenter = Math.sqrt(localX * localX + localY * localY);
  if (distFromCenter > R * 1.1) return;

  for (let b = 0; b < numBranches; b++) {
    const baseAngle = Math.atan2(localY, localX) + (Math.random() - 0.5) * Math.PI * 1.6;
    spawnBranch(localX, localY, baseAngle, maxDepth, 0, 0);
  }
}

function spawnBranch(sx, sy, angle, maxDepth, depth, delay) {
  const segCount = 3 + Math.floor(Math.random() * 5);
  let curX = sx, curY = sy;
  let curAngle = angle;

  for (let i = 0; i < segCount; i++) {
    curAngle += (Math.random() - 0.5) * 0.9;
    const len = 8 + Math.random() * 18;
    const ex = curX + Math.cos(curAngle) * len;
    const ey = curY + Math.sin(curAngle) * len;

    if (ex * ex + ey * ey > (R * 0.95) ** 2) break;

    const seg = {
      x1: curX, y1: curY, x2: ex, y2: ey,
      progress: 0,
      delay: delay + i * 0.04 + depth * 0.08,
      width: Math.max(0.8, 2.5 - depth * 0.5),
      spawned: false,
      depth,
    };
    cracks.push(seg);
    totalCrackLen += len;

    curX = ex;
    curY = ey;

    if (depth < maxDepth && Math.random() < 0.4 - depth * 0.1) {
      const branchAngle = curAngle + (Math.random() > 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.8);
      spawnBranch(curX, curY, branchAngle, maxDepth, depth + 1, delay + i * 0.04 + 0.05);
    }
  }
}

// --- Fragments for destruction ---
function spawnFragment(x, y) {
  const angle = Math.atan2(y, x) + (Math.random() - 0.5) * 1.2;
  const speed = 2 + Math.random() * 6;
  const size = 6 + Math.random() * 16;
  const pts = [];
  const n = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i + Math.random() * 0.5;
    const r = 0.5 + Math.random() * 0.5;
    pts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
  }
  fragments.push({
    x: cx + x, y: cy + y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - 2 - Math.random() * 3,
    size, pts,
    rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.15,
    alpha: 1,
    hue: BALL_HUE + (Math.random() - 0.5) * 30,
  });
}

function destroyBall() {
  destroyed = true;
  playBigCrunch();
  for (let i = 0; i < 50; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * R * 0.85;
    spawnFragment(Math.cos(a) * r, Math.sin(a) * r);
  }
}

// --- Input ---
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

let pressStartTime = 0;
let lastCrackTime = 0;
let firstCrackDone = false;

function onPress(e) {
  e.preventDefault();
  const p = getPos(e);
  const dx = p.x - cx, dy = p.y - cy;
  if (dx * dx + dy * dy > (R * 1.3) ** 2 || destroyed) return;
  initAudio();
  pressing = true;
  pressX = p.x;
  pressY = p.y;
  pressStartTime = performance.now();
  firstCrackDone = false;
  lastCrackTime = 0;
}

function onMove(e) {
  e.preventDefault();
  if (!pressing) return;
  const p = getPos(e);
  pressX = p.x;
  pressY = p.y;
}

function onRelease(e) {
  if (e) e.preventDefault();
  if (!pressing) return;
  pressing = false;
  tSX = 1; tSY = 1;
}

canvas.addEventListener('mousedown', onPress);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onRelease);
canvas.addEventListener('mouseleave', () => { if (pressing) onRelease(); });
canvas.addEventListener('touchstart', onPress);
canvas.addEventListener('touchmove', onMove);
canvas.addEventListener('touchend', onRelease);

resetBtn.addEventListener('click', () => {
  cracks = [];
  fragments = [];
  totalCrackLen = 0;
  destroyed = false;
  pressing = false;
  scaleX = 1; scaleY = 1; tSX = 1; tSY = 1;
  shakeX = 0; shakeY = 0;
});

// --- Resize ---
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  R = Math.min(W, H) * 0.22;
}

// --- Update ---
let time = 0;
function update(dt) {
  time += dt;

  if (pressing && !destroyed) {
    const elapsed = (performance.now() - pressStartTime) / 1000;

    if (!firstCrackDone && elapsed > 0.01) {
      firstCrackDone = true;
      lastCrackTime = elapsed;
      spawnCrackTree(pressX, pressY, 4 + Math.floor(Math.random() * 3), 2);
      playCrack(0.6);
      shakeX = (Math.random() - 0.5) * 6;
      shakeY = (Math.random() - 0.5) * 6;
      tSX = 1.06; tSY = 0.95;
    }

    if (firstCrackDone && elapsed - lastCrackTime > 0.35) {
      lastCrackTime = elapsed;
      const intensity = Math.min(1, elapsed * 0.3);
      spawnCrackTree(pressX, pressY, 2 + Math.floor(intensity * 3), 1 + Math.floor(intensity * 2));
      playCrack(0.3 + intensity * 0.4);
      shakeX += (Math.random() - 0.5) * 4 * intensity;
      shakeY += (Math.random() - 0.5) * 4 * intensity;
      tSX = 1 + intensity * 0.04;
      tSY = 1 - intensity * 0.03;
    }

    const destroyThreshold = R * R * 3.5;
    if (totalCrackLen > destroyThreshold) {
      destroyBall();
    }
  }

  cracks.forEach(seg => {
    if (seg.delay > 0) { seg.delay -= dt; return; }
    seg.progress = Math.min(1, seg.progress + dt * 6);
  });

  scaleX += (tSX - scaleX) * 0.12;
  scaleY += (tSY - scaleY) * 0.12;
  if (!pressing) { tSX = 1; tSY = 1; }
  shakeX *= 0.82;
  shakeY *= 0.82;

  fragments.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.2;
    f.rot += f.rotSpd;
    f.alpha = Math.max(0, f.alpha - 0.01);
  });
  fragments = fragments.filter(f => f.alpha > 0);
}

// --- Draw ---
function drawBall() {
  ctx.save();
  ctx.translate(cx + shakeX, cy + shakeY);
  ctx.scale(scaleX, scaleY);

  // shadow
  ctx.beginPath();
  ctx.ellipse(0, R * 0.88, R * 0.55, R * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fill();

  if (!destroyed) {
    // clip to ball
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.clip();

    // ball body
    const grad = ctx.createRadialGradient(-R * 0.3, -R * 0.3, 0, 0, 0, R * 1.1);
    grad.addColorStop(0, `hsl(${BALL_HUE}, 45%, 85%)`);
    grad.addColorStop(0.5, `hsl(${BALL_HUE}, 40%, 75%)`);
    grad.addColorStop(1, `hsl(${BALL_HUE + 15}, 35%, 62%)`);
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // draw cracks with animated progress
    cracks.forEach(seg => {
      if (seg.progress <= 0) return;
      const p = seg.progress;
      const mx = seg.x1 + (seg.x2 - seg.x1) * p;
      const my = seg.y1 + (seg.y2 - seg.y1) * p;

      // dark crack line
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(mx, my);
      ctx.strokeStyle = `rgba(55, 35, 20, ${0.6 + seg.width * 0.1})`;
      ctx.lineWidth = seg.width;
      ctx.lineCap = 'round';
      ctx.stroke();

      // inner green/light color
      if (seg.width > 1) {
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(mx, my);
        ctx.strokeStyle = `rgba(170, 210, 130, 0.35)`;
        ctx.lineWidth = seg.width * 0.4;
        ctx.stroke();
      }
    });

    // highlight (on top)
    ctx.beginPath();
    ctx.ellipse(-R * 0.22, -R * 0.38, R * 0.3, R * 0.13, -0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-R * 0.12, -R * 0.48, R * 0.1, R * 0.05, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();

    ctx.restore(); // unclip
  }

  ctx.restore();
}

function drawFragments() {
  fragments.forEach(f => {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.globalAlpha = f.alpha;
    ctx.beginPath();
    f.pts.forEach((p, i) => {
      const x = p.x * f.size, y = p.y * f.size;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle = `hsl(${f.hue}, 38%, 72%)`;
    ctx.fill();
    ctx.strokeStyle = 'rgba(55,35,20,0.25)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function drawBg() {
  ctx.fillStyle = '#f0ebe6';
  ctx.fillRect(0, 0, W, H);
}

let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  update(dt);
  drawBg();
  drawFragments();
  drawBall();
  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);
window.addEventListener('resize', resize);
</script>
</body>
</html>
