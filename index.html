<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>왁뿌볼 Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0eb;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  .title {
    position: fixed;
    top: 25px;
    color: #8a7060;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .hint {
    position: fixed;
    bottom: 35px;
    color: #a09080;
    font-size: 14px;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .reset-btn {
    position: fixed;
    bottom: 70px;
    background: #d4c4b0;
    border: none;
    padding: 10px 24px;
    border-radius: 20px;
    color: #5a4a3a;
    font-size: 14px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s;
    letter-spacing: 1px;
  }
  .reset-btn.show { opacity: 1; }
  .reset-btn:hover { background: #c4b4a0; }

  canvas {
    cursor: pointer;
    touch-action: none;
  }
</style>
</head>
<body>
<div class="title">왁뿌볼</div>
<canvas id="canvas"></canvas>
<button class="reset-btn" id="resetBtn" onclick="resetBall()">새 왁뿌볼</button>
<div class="hint">꾹 눌러서 부숴보세요!</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const resetBtn = document.getElementById('resetBtn');

let W, H, centerX, centerY, ballRadius;
let pressing = false;
let pressX = 0, pressY = 0;
let pressForce = 0;
let scaleX = 1, scaleY = 1;
let targetScaleX = 1, targetScaleY = 1;

const COLORS = [
  { outer: '#e8a0b0', mid: '#f0c0d0', inner: '#f8dde6' },
  { outer: '#a0c8e8', mid: '#c0ddf0', inner: '#ddeef8' },
  { outer: '#a0e8b8', mid: '#c0f0d0', inner: '#ddf8e6' },
];

let cracks = [];
let fragments = [];
let crumbs = [];
let totalDamage = 0;
let shakeX = 0, shakeY = 0;
let ballAlpha = 1;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  centerX = W / 2;
  centerY = H / 2;
  ballRadius = Math.min(W, H) * 0.22;
}

function resetBall() {
  cracks = [];
  fragments = [];
  crumbs = [];
  totalDamage = 0;
  pressForce = 0;
  pressing = false;
  ballAlpha = 1;
  scaleX = 1; scaleY = 1;
  targetScaleX = 1; targetScaleY = 1;
  shakeX = 0; shakeY = 0;
  resetBtn.classList.remove('show');
}

function addCrack(x, y, force) {
  const angle = Math.atan2(y - centerY, x - centerX);
  const numBranches = 2 + Math.floor(force * 4);

  for (let b = 0; b < numBranches; b++) {
    const branchAngle = angle + (Math.random() - 0.5) * Math.PI * 0.8;
    const segments = [];
    let cx = x - centerX, cy = y - centerY;
    const len = 3 + Math.floor(force * 8);

    for (let i = 0; i < len; i++) {
      const segAngle = branchAngle + (Math.random() - 0.5) * 1.2;
      const segLen = 4 + Math.random() * 10 * force;
      const nx = cx + Math.cos(segAngle) * segLen;
      const ny = cy + Math.sin(segAngle) * segLen;

      const dist = Math.sqrt(nx * nx + ny * ny);
      if (dist > ballRadius * 0.95) break;

      segments.push({ x1: cx, y1: cy, x2: nx, y2: ny });
      cx = nx;
      cy = ny;
    }

    if (segments.length > 0) {
      cracks.push({
        segments,
        width: 1 + force * 2.5,
        alpha: 0.6 + force * 0.4,
        color: `rgba(80, 50, 30, ${0.4 + force * 0.4})`,
      });
    }
  }
}

function addCrumbs(x, y, force) {
  const count = 3 + Math.floor(force * 12);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4 * force;
    const size = 2 + Math.random() * 6;
    const colorIdx = Math.floor(Math.random() * COLORS.length);
    const c = COLORS[colorIdx];
    crumbs.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size,
      color: Math.random() > 0.4 ? c.outer : '#f0e8e0',
      alpha: 1,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      life: 1,
    });
  }
}

function addFragments(x, y, force) {
  if (force < 0.5) return;
  const count = 1 + Math.floor(force * 3);
  for (let i = 0; i < count; i++) {
    const angle = Math.atan2(y - centerY, x - centerX) + (Math.random() - 0.5) * 1.5;
    const speed = 2 + Math.random() * 5 * force;
    const size = 8 + Math.random() * 15;
    const colorIdx = Math.floor(Math.random() * COLORS.length);
    const c = COLORS[colorIdx];
    fragments.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      size,
      outerColor: c.outer,
      innerColor: c.inner,
      alpha: 1,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15,
      life: 1,
      shape: generateFragmentShape(),
    });
  }
}

function generateFragmentShape() {
  const pts = [];
  const n = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i + (Math.random() - 0.5) * 0.5;
    const r = 0.5 + Math.random() * 0.5;
    pts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
  }
  return pts;
}

function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function isInsideBall(px, py) {
  const dx = px - centerX;
  const dy = py - centerY;
  return Math.sqrt(dx * dx + dy * dy) < ballRadius * 1.2;
}

function onPress(e) {
  const pos = getPos(e);
  if (!isInsideBall(pos.x, pos.y)) return;
  if (totalDamage >= 1) return;
  pressing = true;
  pressX = pos.x;
  pressY = pos.y;
  pressForce = 0;
}

function onMove(e) {
  if (!pressing) return;
  const pos = getPos(e);
  pressX = pos.x;
  pressY = pos.y;
}

function onRelease() {
  if (!pressing) return;
  pressing = false;

  if (pressForce > 0.05 && totalDamage < 1) {
    addCrack(pressX, pressY, pressForce);
    addCrumbs(pressX, pressY, pressForce);
    addFragments(pressX, pressY, pressForce);

    totalDamage = Math.min(1, totalDamage + pressForce * 0.15);

    shakeX = (Math.random() - 0.5) * pressForce * 15;
    shakeY = (Math.random() - 0.5) * pressForce * 15;

    targetScaleX = 1 + pressForce * 0.3;
    targetScaleY = 1 - pressForce * 0.2;

    if (totalDamage >= 1) {
      explodeBall();
    }
  }

  pressForce = 0;
}

function explodeBall() {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * ballRadius * 0.8;
    const x = centerX + Math.cos(angle) * dist;
    const y = centerY + Math.sin(angle) * dist;
    addFragments(x, y, 1);
    addCrumbs(x, y, 1);
  }
  ballAlpha = 0;
  resetBtn.classList.add('show');
}

canvas.addEventListener('mousedown', onPress);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onRelease);
canvas.addEventListener('mouseleave', onRelease);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onPress(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e); });
canvas.addEventListener('touchend', e => { e.preventDefault(); onRelease(); });

function update() {
  if (pressing) {
    pressForce = Math.min(pressForce + 0.015, 1);
    targetScaleX = 1 + pressForce * 0.08;
    targetScaleY = 1 - pressForce * 0.06;

    if (pressForce > 0.3 && Math.random() < pressForce * 0.15) {
      addCrumbs(pressX, pressY, pressForce * 0.3);
    }
  } else {
    targetScaleX = 1;
    targetScaleY = 1;
  }

  scaleX += (targetScaleX - scaleX) * 0.15;
  scaleY += (targetScaleY - scaleY) * 0.15;
  shakeX *= 0.85;
  shakeY *= 0.85;

  crumbs.forEach(c => {
    c.x += c.vx;
    c.y += c.vy;
    c.vy += 0.15;
    c.rotation += c.rotSpeed;
    c.life -= 0.015;
    c.alpha = Math.max(0, c.life);
  });
  crumbs = crumbs.filter(c => c.life > 0);

  fragments.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.12;
    f.vx *= 0.99;
    f.rotation += f.rotSpeed;
    f.life -= 0.008;
    f.alpha = Math.max(0, f.life);
  });
  fragments = fragments.filter(f => f.life > 0);
}

function drawBall() {
  if (ballAlpha <= 0) return;

  ctx.save();
  ctx.translate(centerX + shakeX, centerY + shakeY);
  ctx.scale(scaleX, scaleY);
  ctx.globalAlpha = ballAlpha;

  // shadow
  ctx.beginPath();
  ctx.ellipse(0, ballRadius * 0.85, ballRadius * 0.6, ballRadius * 0.1, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fill();

  // 3-color ball: three colored sections
  const sectionAngles = [
    { start: -Math.PI / 2 - 0.1, end: Math.PI * 2 / 3 - Math.PI / 2, color: COLORS[0] },
    { start: Math.PI * 2 / 3 - Math.PI / 2, end: Math.PI * 4 / 3 - Math.PI / 2, color: COLORS[1] },
    { start: Math.PI * 4 / 3 - Math.PI / 2, end: Math.PI * 2 - Math.PI / 2 - 0.1, color: COLORS[2] },
  ];

  // base circle
  ctx.beginPath();
  ctx.arc(0, 0, ballRadius, 0, Math.PI * 2);
  ctx.fillStyle = '#f0e8e0';
  ctx.fill();

  // colored sections
  sectionAngles.forEach(sec => {
    const grad = ctx.createRadialGradient(
      -ballRadius * 0.2, -ballRadius * 0.2, 0,
      0, 0, ballRadius
    );
    grad.addColorStop(0, sec.color.inner);
    grad.addColorStop(0.5, sec.color.mid);
    grad.addColorStop(1, sec.color.outer);

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, ballRadius, sec.start, sec.end);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // section divider lines
  sectionAngles.forEach(sec => {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(sec.start) * ballRadius, Math.sin(sec.start) * ballRadius);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // wax texture overlay
  for (let i = 0; i < 20; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * ballRadius * 0.9;
    const size = 1 + Math.random() * 3;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * r, Math.sin(a) * r, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${0.05 + Math.random() * 0.1})`;
    ctx.fill();
  }

  // highlight shine
  ctx.beginPath();
  ctx.ellipse(-ballRadius * 0.25, -ballRadius * 0.35,
    ballRadius * 0.35, ballRadius * 0.18, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(-ballRadius * 0.15, -ballRadius * 0.45,
    ballRadius * 0.12, ballRadius * 0.06, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();

  // press deformation indicator
  if (pressing && pressForce > 0.05) {
    const px = pressX - centerX;
    const py = pressY - centerY;
    ctx.beginPath();
    ctx.arc(px, py, ballRadius * 0.15 * pressForce, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,0,0,${pressForce * 0.08})`;
    ctx.fill();
  }

  // draw cracks
  cracks.forEach(crack => {
    ctx.beginPath();
    crack.segments.forEach(seg => {
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
    });
    ctx.strokeStyle = crack.color;
    ctx.lineWidth = crack.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  });

  // damage darkening
  if (totalDamage > 0.3) {
    ctx.beginPath();
    ctx.arc(0, 0, ballRadius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(80, 50, 30, ${(totalDamage - 0.3) * 0.15})`;
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawFragments() {
  fragments.forEach(f => {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation);
    ctx.globalAlpha = f.alpha;

    ctx.beginPath();
    const pts = f.shape;
    ctx.moveTo(pts[0].x * f.size, pts[0].y * f.size);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i].x * f.size, pts[i].y * f.size);
    }
    ctx.closePath();

    const grad = ctx.createLinearGradient(-f.size, -f.size, f.size, f.size);
    grad.addColorStop(0, f.innerColor);
    grad.addColorStop(1, f.outerColor);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = 'rgba(80,50,30,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function drawCrumbs() {
  crumbs.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.globalAlpha = c.alpha;
    ctx.beginPath();
    ctx.arc(0, 0, c.size, 0, Math.PI * 2);
    ctx.fillStyle = c.color;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function drawBackground() {
  ctx.fillStyle = '#f5f0eb';
  ctx.fillRect(0, 0, W, H);

  // subtle surface texture
  ctx.fillStyle = 'rgba(200, 180, 160, 0.03)';
  for (let i = 0; i < 30; i++) {
    const x = (i * 137.5) % W;
    const y = (i * 97.3) % H;
    ctx.fillRect(x, y, 2, 2);
  }
}

function loop() {
  update();
  drawBackground();
  drawFragments();
  drawCrumbs();
  drawBall();
  requestAnimationFrame(loop);
}

resize();
loop();
window.addEventListener('resize', resize);
</script>
</body>
</html>
