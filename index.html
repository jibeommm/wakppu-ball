<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>왁뿌볼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ebe6;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }
  .title { position: fixed; top: 22px; color: #9a8878; font-size: 18px; font-weight: bold; letter-spacing: 3px; }
  .hint { position: fixed; bottom: 28px; color: #b0a090; font-size: 13px; opacity: 0.6; }
  .reset-btn {
    position: fixed; bottom: 60px;
    background: #d4c4b0; border: none; padding: 10px 28px;
    border-radius: 20px; color: #5a4a3a; font-size: 14px;
    cursor: pointer; letter-spacing: 1px; z-index: 10;
  }
  .reset-btn:hover { background: #c4b4a0; }
  canvas { cursor: pointer; touch-action: none; }
</style>
</head>
<body>
<div class="title">왁뿌볼</div>
<canvas id="c"></canvas>
<button class="reset-btn" id="resetBtn">새 왁뿌볼</button>
<div class="hint">꾹 눌러서 부숴보세요!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const resetBtn = document.getElementById('resetBtn');

let W, H, cx, cy, R;
let scaleX = 1, scaleY = 1, tSX = 1, tSY = 1;
let shakeX = 0, shakeY = 0;
let destroyed = false;
let pressing = false, pressX = 0, pressY = 0;
let pressStart = 0;
let firstDone = false, secondDone = false;
let totalCracks = 0;

const BALL_HUE = 270;

// --- Audio ---
let audioCtx;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playCrack(intensity) {
  if (!audioCtx) return;
  const n = 3 + Math.floor(intensity * 5);
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const dur = 0.015 + Math.random() * 0.04;
      const t = audioCtx.currentTime;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1) * (1 - j / d.length);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 1200 + Math.random() * 3000;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.15 + intensity * 0.25, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(hp).connect(gain).connect(audioCtx.destination);
      src.start(t); src.stop(t + dur);
    }, i * 8);
  }
}

function playBigCrunch() {
  if (!audioCtx) return;
  for (let i = 0; i < 30; i++) {
    setTimeout(() => playCrack(0.5 + Math.random() * 0.5), i * 12);
  }
}

// --- Crack system ---
let crackLines = [];
let fragments = [];

function makeCrackLine(startX, startY, angle) {
  const points = [{ x: startX, y: startY }];
  let curX = startX, curY = startY, curA = angle;
  const stepLen = 6 + Math.random() * 4;

  for (let i = 0; i < 200; i++) {
    curA += (Math.random() - 0.5) * 0.6;
    curX += Math.cos(curA) * stepLen;
    curY += Math.sin(curA) * stepLen;

    if (curX * curX + curY * curY >= R * R * 0.97) {
      const norm = Math.sqrt(curX * curX + curY * curY);
      curX = (curX / norm) * R * 0.98;
      curY = (curY / norm) * R * 0.98;
      points.push({ x: curX, y: curY });
      break;
    }
    points.push({ x: curX, y: curY });
  }

  return points;
}

function spawnCracks(ox, oy, count) {
  const lx = ox - cx, ly = oy - cy;
  const numLines = count;

  for (let i = 0; i < numLines; i++) {
    const angle = (Math.PI * 2 / numLines) * i + (Math.random() - 0.5) * 0.5;
    const pts = makeCrackLine(lx, ly, angle);

    crackLines.push({
      points: pts,
      width: 1.5 + Math.random() * 1.5,
      appear: performance.now(),
    });
    totalCracks++;

    // one fork per line, sometimes
    if (Math.random() < 0.5 && pts.length > 3) {
      const forkIdx = 1 + Math.floor(Math.random() * Math.min(4, pts.length - 2));
      const forkPt = pts[forkIdx];
      const forkAngle = angle + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.7);
      const forkPts = makeCrackLine(forkPt.x, forkPt.y, forkAngle);
      crackLines.push({
        points: forkPts,
        width: 1 + Math.random(),
        appear: performance.now() + 30,
      });
      totalCracks++;
    }
  }
}

// --- Fragments ---
function spawnFragment(x, y) {
  const angle = Math.atan2(y, x) + (Math.random() - 0.5) * 1;
  const speed = 2 + Math.random() * 5;
  const size = 5 + Math.random() * 14;
  const n = 4 + Math.floor(Math.random() * 3);
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 / n) * i + Math.random() * 0.5;
    pts.push({ x: Math.cos(a) * (0.5 + Math.random() * 0.5), y: Math.sin(a) * (0.5 + Math.random() * 0.5) });
  }
  fragments.push({
    x: cx + x, y: cy + y,
    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2 - Math.random() * 3,
    size, pts, rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.15, alpha: 1,
    hue: BALL_HUE + (Math.random() - 0.5) * 30,
  });
}

function destroyBall() {
  destroyed = true;
  pressing = false;
  playBigCrunch();
  for (let i = 0; i < 50; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * R * 0.85;
    spawnFragment(Math.cos(a) * r, Math.sin(a) * r);
  }
}

// --- Input ---
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onPress(e) {
  e.preventDefault();
  const p = getPos(e);
  const dx = p.x - cx, dy = p.y - cy;
  if (dx * dx + dy * dy > (R * 1.3) ** 2 || destroyed) return;
  initAudio();
  pressing = true;
  pressX = p.x; pressY = p.y;
  pressStart = performance.now();
  firstDone = false;
  secondDone = false;
}

function onMove(e) { e.preventDefault(); }

function onRelease(e) {
  if (e) e.preventDefault();
  if (!pressing) return;
  pressing = false;
  tSX = 1; tSY = 1;
}

canvas.addEventListener('mousedown', onPress);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onRelease);
canvas.addEventListener('mouseleave', () => { if (pressing) onRelease(); });
canvas.addEventListener('touchstart', onPress);
canvas.addEventListener('touchmove', onMove);
canvas.addEventListener('touchend', onRelease);

resetBtn.addEventListener('click', () => {
  crackLines = []; fragments = []; totalCracks = 0;
  destroyed = false; pressing = false;
  scaleX = 1; scaleY = 1; tSX = 1; tSY = 1;
  shakeX = 0; shakeY = 0;
});

// --- Resize ---
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  R = Math.min(W, H) * 0.22;
}

// --- Update ---
function update() {
  if (pressing && !destroyed) {
    const elapsed = (performance.now() - pressStart) / 1000;

    // first crack: instant on press
    if (!firstDone) {
      firstDone = true;
      const n = 3 + Math.floor(Math.random() * 2); // 3~4 lines
      spawnCracks(pressX, pressY, n);
      playCrack(0.8);
      shakeX = (Math.random() - 0.5) * 8;
      shakeY = (Math.random() - 0.5) * 8;
      tSX = 1.07; tSY = 0.94;
    }

    // second crack: at ~0.5s if still pressing
    if (!secondDone && elapsed > 0.5) {
      secondDone = true;
      const n = 2 + Math.floor(Math.random() * 2); // 2~3 more
      spawnCracks(pressX, pressY, n);
      playCrack(1.0);
      shakeX += (Math.random() - 0.5) * 10;
      shakeY += (Math.random() - 0.5) * 10;
      tSX = 1.09; tSY = 0.92;
    }

    // auto-release at 1 second
    if (elapsed >= 1.0) {
      pressing = false;
      tSX = 1; tSY = 1;
    }

    // destroy threshold
    if (totalCracks > 25) {
      destroyBall();
    }
  }

  scaleX += (tSX - scaleX) * 0.2;
  scaleY += (tSY - scaleY) * 0.2;
  if (!pressing) { tSX = 1; tSY = 1; }
  shakeX *= 0.8;
  shakeY *= 0.8;

  fragments.forEach(f => {
    f.x += f.vx; f.y += f.vy;
    f.vy += 0.22; f.rot += f.rotSpd;
    f.alpha = Math.max(0, f.alpha - 0.01);
  });
  fragments = fragments.filter(f => f.alpha > 0);
}

// --- Draw ---
function drawBall() {
  ctx.save();
  ctx.translate(cx + shakeX, cy + shakeY);
  ctx.scale(scaleX, scaleY);

  // shadow
  ctx.beginPath();
  ctx.ellipse(0, R * 0.88, R * 0.55, R * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fill();

  if (!destroyed) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.clip();

    // ball body
    const grad = ctx.createRadialGradient(-R * 0.3, -R * 0.3, 0, 0, 0, R * 1.1);
    grad.addColorStop(0, `hsl(${BALL_HUE}, 45%, 85%)`);
    grad.addColorStop(0.5, `hsl(${BALL_HUE}, 40%, 75%)`);
    grad.addColorStop(1, `hsl(${BALL_HUE + 15}, 35%, 62%)`);
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // crack lines - draw instantly (no animation)
    const now = performance.now();
    crackLines.forEach(crack => {
      const age = now - crack.appear;
      if (age < 0) return;

      // fast reveal: full line appears within 50ms
      const reveal = Math.min(1, age / 50);
      const showCount = Math.ceil(crack.points.length * reveal);

      if (showCount < 2) return;

      // dark crack
      ctx.beginPath();
      ctx.moveTo(crack.points[0].x, crack.points[0].y);
      for (let i = 1; i < showCount; i++) {
        ctx.lineTo(crack.points[i].x, crack.points[i].y);
      }
      ctx.strokeStyle = 'rgba(50, 30, 15, 0.75)';
      ctx.lineWidth = crack.width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();

      // inner lighter line
      ctx.beginPath();
      ctx.moveTo(crack.points[0].x, crack.points[0].y);
      for (let i = 1; i < showCount; i++) {
        ctx.lineTo(crack.points[i].x, crack.points[i].y);
      }
      ctx.strokeStyle = 'rgba(180, 215, 140, 0.3)';
      ctx.lineWidth = crack.width * 0.4;
      ctx.stroke();
    });

    // highlight
    ctx.beginPath();
    ctx.ellipse(-R * 0.22, -R * 0.38, R * 0.3, R * 0.13, -0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(-R * 0.12, -R * 0.48, R * 0.1, R * 0.05, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();

    ctx.restore();
  }

  ctx.restore();
}

function drawFragments() {
  fragments.forEach(f => {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.globalAlpha = f.alpha;
    ctx.beginPath();
    f.pts.forEach((p, i) => {
      i === 0 ? ctx.moveTo(p.x * f.size, p.y * f.size) : ctx.lineTo(p.x * f.size, p.y * f.size);
    });
    ctx.closePath();
    ctx.fillStyle = `hsl(${f.hue}, 38%, 72%)`;
    ctx.fill();
    ctx.strokeStyle = 'rgba(50,30,15,0.2)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function loop() {
  update();
  ctx.fillStyle = '#f0ebe6';
  ctx.fillRect(0, 0, W, H);
  drawFragments();
  drawBall();
  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);
window.addEventListener('resize', resize);
</script>
</body>
</html>
