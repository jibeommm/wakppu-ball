<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>왁뿌볼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ebe6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .title { position: fixed; top: 22px; color: #9a8878; font-size: 18px; font-weight: bold; letter-spacing: 3px; }
  .hint { position: fixed; bottom: 30px; color: #b0a090; font-size: 13px; opacity: 0.6; }
  .reset-btn {
    position: fixed; bottom: 65px;
    background: #d4c4b0; border: none; padding: 10px 28px;
    border-radius: 20px; color: #5a4a3a; font-size: 14px;
    cursor: pointer; opacity: 0; transition: opacity 0.5s; letter-spacing: 1px;
  }
  .reset-btn.show { opacity: 1; }
  canvas { cursor: pointer; touch-action: none; }
</style>
</head>
<body>
<div class="title">왁뿌볼</div>
<canvas id="c"></canvas>
<button class="reset-btn" id="resetBtn">새 왁뿌볼</button>
<div class="hint">꾹 눌러서 부숴보세요!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const resetBtn = document.getElementById('resetBtn');

let W, H, cx, cy, R;
let pressing = false, pressForce = 0;
let scaleX = 1, scaleY = 1, tScaleX = 1, tScaleY = 1;
let shakeX = 0, shakeY = 0;
let crackLevel = 0;
let destroyed = false;

// --- Audio ---
let audioCtx;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playCrack(intensity) {
  if (!audioCtx) return;
  const count = 3 + Math.floor(intensity * 8);
  for (let i = 0; i < count; i++) {
    setTimeout(() => playOneCrack(intensity), i * (15 + Math.random() * 40));
  }
}

function playOneCrack(intensity) {
  if (!audioCtx) return;
  const dur = 0.03 + Math.random() * 0.06;
  const t = audioCtx.currentTime;

  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  }

  const src = audioCtx.createBufferSource();
  src.buffer = buf;

  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 800 + Math.random() * 3000;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 2000 + Math.random() * 4000;
  bp.Q.value = 1 + Math.random() * 3;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15 + intensity * 0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);

  src.connect(hp).connect(bp).connect(gain).connect(audioCtx.destination);
  src.start(t);
  src.stop(t + dur);
}

function playDeepCrunch() {
  if (!audioCtx) return;
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      playOneCrack(0.8 + Math.random() * 0.2);
    }, i * 20 + Math.random() * 30);
  }
}

// --- Voronoi-like crack cells ---
let cells = [];
let cellSeeds = [];
let fragments = [];

function generateCells() {
  cells = [];
  cellSeeds = [];
  fragments = [];

  const numCells = 35 + Math.floor(Math.random() * 15);

  for (let i = 0; i < numCells; i++) {
    let x, y;
    do {
      x = (Math.random() - 0.5) * 2 * R * 0.92;
      y = (Math.random() - 0.5) * 2 * R * 0.92;
    } while (x * x + y * y > (R * 0.9) ** 2);

    cellSeeds.push({ x, y });
  }

  const step = 3;
  const pixelMap = {};

  for (let px = -R; px <= R; px += step) {
    for (let py = -R; py <= R; py += step) {
      if (px * px + py * py > R * R) continue;
      let minDist = Infinity, minIdx = 0;
      for (let i = 0; i < cellSeeds.length; i++) {
        const dx = px - cellSeeds[i].x;
        const dy = py - cellSeeds[i].y;
        const d = dx * dx + dy * dy;
        if (d < minDist) { minDist = d; minIdx = i; }
      }
      const key = `${px},${py}`;
      pixelMap[key] = minIdx;
    }
  }

  const edgePixels = [];
  for (let px = -R; px <= R; px += step) {
    for (let py = -R; py <= R; py += step) {
      if (px * px + py * py > R * R) continue;
      const key = `${px},${py}`;
      const idx = pixelMap[key];
      const neighbors = [
        `${px + step},${py}`, `${px - step},${py}`,
        `${px},${py + step}`, `${px},${py - step}`,
      ];
      for (const nk of neighbors) {
        if (pixelMap[nk] !== undefined && pixelMap[nk] !== idx) {
          edgePixels.push({ x: px, y: py, jitter: (Math.random() - 0.5) * 2 });
          break;
        }
      }
    }
  }

  cells = cellSeeds.map((seed, i) => ({
    seed,
    offsetX: 0, offsetY: 0,
    targetOffsetX: 0, targetOffsetY: 0,
    colorShift: Math.random() * 30 - 15,
    fallen: false,
    fallVy: 0, fallVx: 0, fallRot: 0, fallRotSpeed: 0, fallAlpha: 1,
  }));

  return edgePixels;
}

let edgePixels = [];
let crackAlpha = 0;
let crackTargetAlpha = 0;
let crackWidth = 1;
let gapSize = 0;
let targetGapSize = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  R = Math.min(W, H) * 0.22;
  resetBall();
}

function resetBall() {
  edgePixels = generateCells();
  crackLevel = 0;
  crackAlpha = 0;
  crackTargetAlpha = 0;
  crackWidth = 1;
  gapSize = 0;
  targetGapSize = 0;
  pressForce = 0;
  pressing = false;
  destroyed = false;
  scaleX = 1; scaleY = 1;
  tScaleX = 1; tScaleY = 1;
  shakeX = 0; shakeY = 0;
  fragments = [];
  cells.forEach(c => {
    c.offsetX = 0; c.offsetY = 0;
    c.targetOffsetX = 0; c.targetOffsetY = 0;
    c.fallen = false; c.fallVy = 0; c.fallAlpha = 1;
  });
  resetBtn.classList.remove('show');
}

resetBtn.addEventListener('click', resetBall);

// --- Input ---
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function isInside(px, py) {
  const dx = px - cx, dy = py - cy;
  return dx * dx + dy * dy < (R * 1.3) ** 2;
}

function onPress(e) {
  e.preventDefault();
  const p = getPos(e);
  if (!isInside(p.x, p.y) || destroyed) return;
  initAudio();
  pressing = true;
  pressForce = 0;
}

function onMove(e) { e.preventDefault(); }

function onRelease(e) {
  if (e) e.preventDefault();
  if (!pressing) return;
  pressing = false;

  if (pressForce > 0.03 && !destroyed) {
    const prevLevel = crackLevel;

    if (crackLevel === 0) {
      crackTargetAlpha = 0.8;
      crackLevel = 1;
      playCrack(0.7);
    } else {
      crackLevel = Math.min(5, crackLevel + 1);
      playCrack(Math.min(1, pressForce + 0.3));
    }

    crackWidth = 1 + crackLevel * 0.8;
    targetGapSize = crackLevel * 1.5;

    cells.forEach(c => {
      const dist = Math.sqrt(c.seed.x ** 2 + c.seed.y ** 2);
      const angle = Math.atan2(c.seed.y, c.seed.x);
      const push = (crackLevel * 1.2 + pressForce * 2) * (0.5 + dist / R);
      c.targetOffsetX = Math.cos(angle) * push;
      c.targetOffsetY = Math.sin(angle) * push;
    });

    shakeX = (Math.random() - 0.5) * 8 * crackLevel;
    shakeY = (Math.random() - 0.5) * 8 * crackLevel;
    tScaleX = 1 + pressForce * 0.15;
    tScaleY = 1 - pressForce * 0.1;

    if (crackLevel >= 5) {
      destroyBall();
    }
  }

  pressForce = 0;
}

canvas.addEventListener('mousedown', onPress);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onRelease);
canvas.addEventListener('mouseleave', () => { if(pressing) onRelease(); });
canvas.addEventListener('touchstart', onPress);
canvas.addEventListener('touchmove', onMove);
canvas.addEventListener('touchend', onRelease);

function destroyBall() {
  destroyed = true;
  playDeepCrunch();

  cells.forEach(c => {
    const angle = Math.atan2(c.seed.y, c.seed.x) + (Math.random() - 0.5) * 0.8;
    const speed = 2 + Math.random() * 6;
    c.fallVx = Math.cos(angle) * speed;
    c.fallVy = Math.sin(angle) * speed - 3 - Math.random() * 3;
    c.fallRotSpeed = (Math.random() - 0.5) * 0.15;
    c.fallen = true;
  });

  setTimeout(() => resetBtn.classList.add('show'), 800);
}

// --- Update ---
function update() {
  if (pressing && !destroyed) {
    pressForce = Math.min(pressForce + 0.012, 1);
    tScaleX = 1 + pressForce * 0.06;
    tScaleY = 1 - pressForce * 0.04;

    if (pressForce > 0.3 && crackLevel > 0 && Math.random() < pressForce * 0.04) {
      playOneCrack(pressForce * 0.3);
    }
  } else if (!destroyed) {
    tScaleX = 1; tScaleY = 1;
  }

  scaleX += (tScaleX - scaleX) * 0.15;
  scaleY += (tScaleY - scaleY) * 0.15;
  shakeX *= 0.85; shakeY *= 0.85;
  crackAlpha += (crackTargetAlpha - crackAlpha) * 0.15;
  gapSize += (targetGapSize - gapSize) * 0.1;

  cells.forEach(c => {
    if (c.fallen) {
      c.offsetX += c.fallVx;
      c.offsetY += c.fallVy;
      c.fallVy += 0.25;
      c.fallRot += c.fallRotSpeed;
      c.fallAlpha = Math.max(0, c.fallAlpha - 0.012);
    } else {
      c.offsetX += (c.targetOffsetX - c.offsetX) * 0.08;
      c.offsetY += (c.targetOffsetY - c.offsetY) * 0.08;
    }
  });
}

// --- Draw ---
const BALL_HUE = 270;

function drawBall() {
  ctx.save();
  ctx.translate(cx + shakeX, cy + shakeY);
  ctx.scale(scaleX, scaleY);

  // shadow
  ctx.beginPath();
  ctx.ellipse(0, R * 0.9, R * 0.55, R * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fill();

  if (!destroyed) {
    // main ball
    const grad = ctx.createRadialGradient(-R * 0.3, -R * 0.3, 0, 0, 0, R * 1.1);
    grad.addColorStop(0, `hsl(${BALL_HUE}, 45%, 85%)`);
    grad.addColorStop(0.5, `hsl(${BALL_HUE}, 40%, 75%)`);
    grad.addColorStop(1, `hsl(${BALL_HUE + 15}, 35%, 62%)`);

    ctx.beginPath();
    ctx.arc(0, 0, R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // inner color visible through cracks
    if (crackAlpha > 0.01) {
      ctx.beginPath();
      ctx.arc(0, 0, R - 1, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(90, 50%, 75%, ${crackAlpha * 0.3})`;
      ctx.fill();
    }

    // draw cell gaps (cracks) with gap offset
    if (crackAlpha > 0.01) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, 0, R, 0, Math.PI * 2);
      ctx.clip();

      // redraw cells with offsets to create gap effect
      cells.forEach((cell, i) => {
        const ox = cell.offsetX;
        const oy = cell.offsetY;

        if (Math.abs(ox) < 0.01 && Math.abs(oy) < 0.01 && crackLevel < 1) return;

        ctx.beginPath();
        edgePixels.forEach(ep => {
          const nearestIdx = getNearestCell(ep.x, ep.y);
          if (nearestIdx === i) {
            ctx.moveTo(ep.x + ox + ep.jitter, ep.y + oy + ep.jitter);
            ctx.lineTo(ep.x + ox + ep.jitter + 1, ep.y + oy + ep.jitter + 1);
          }
        });
      });

      // draw crack lines
      edgePixels.forEach(ep => {
        ctx.beginPath();
        ctx.arc(ep.x + ep.jitter * 0.5, ep.y + ep.jitter * 0.5, crackWidth, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(60, 40, 25, ${crackAlpha * 0.7})`;
        ctx.fill();
      });

      // lighter inner crack color
      edgePixels.forEach(ep => {
        ctx.beginPath();
        ctx.arc(ep.x + ep.jitter * 0.3, ep.y + ep.jitter * 0.3, crackWidth * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(160, 200, 120, ${crackAlpha * 0.4})`;
        ctx.fill();
      });

      ctx.restore();
    }

    // highlight
    ctx.beginPath();
    ctx.ellipse(-R * 0.22, -R * 0.38, R * 0.32, R * 0.14, -0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(-R * 0.12, -R * 0.48, R * 0.1, R * 0.05, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();

    // press indicator
    if (pressing && pressForce > 0.05) {
      ctx.beginPath();
      ctx.arc(0, 0, R * 0.2 * pressForce, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${pressForce * 0.05})`;
      ctx.fill();
    }
  }

  // draw fallen fragments
  cells.forEach((cell, i) => {
    if (!cell.fallen || cell.fallAlpha <= 0) return;

    ctx.save();
    ctx.translate(cell.seed.x + cell.offsetX, cell.seed.y + cell.offsetY);
    ctx.rotate(cell.fallRot);
    ctx.globalAlpha = cell.fallAlpha;

    const fragSize = 8 + Math.random() * 4;
    const pts = 5 + Math.floor(Math.random() * 3);

    ctx.beginPath();
    for (let j = 0; j < pts; j++) {
      const a = (Math.PI * 2 / pts) * j + (i * 0.5);
      const r = fragSize * (0.6 + Math.random() * 0.4);
      if (j === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
      else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();

    const h = BALL_HUE + cell.colorShift;
    ctx.fillStyle = `hsl(${h}, 38%, 72%)`;
    ctx.fill();
    ctx.strokeStyle = `rgba(60,40,25,0.3)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.restore();
  });

  ctx.restore();
}

function getNearestCell(px, py) {
  let minDist = Infinity, minIdx = 0;
  for (let i = 0; i < cellSeeds.length; i++) {
    const dx = px - cellSeeds[i].x;
    const dy = py - cellSeeds[i].y;
    const d = dx * dx + dy * dy;
    if (d < minDist) { minDist = d; minIdx = i; }
  }
  return minIdx;
}

function drawBg() {
  ctx.fillStyle = '#f0ebe6';
  ctx.fillRect(0, 0, W, H);
}

function loop() {
  update();
  drawBg();
  drawBall();
  requestAnimationFrame(loop);
}

resize();
loop();
window.addEventListener('resize', resize);
</script>
</body>
</html>
